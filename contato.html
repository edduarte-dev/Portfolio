<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Projeto Portfólio">
    <meta name="author" content="Generation Brasil">
    <meta name="keywords" content="HTML, CSS, JavaScript">
    <link rel="icon" type="image/svg+xml" href="./assets/img/contact-book-svgrepo-com.svg" />

    <link rel="stylesheet" href="assets/css/style.css">

    <title>Contato</title>
</head>

<body>

    <!-- Cabeçalho -->
    <header>
        <h1>Eduardo Duarte Cunha</h1>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <!-- Conteúdo principal -->
    <main class="main_contato">
        

        <!-- Formulário de Contato -->
        <form action="#" method="submit" id="formulario">

            <label for="name">Nome:</label>
            <input id="name" type="text" name="nome" placeholder="Digite seu nome">
            <span id="errNome"></span>

            <label for="email">Email:</label>
            <input id="email" type="email" name="email" placeholder="Digite seu email">
            <span id="errEmail"></span>

            <label for="subject">Assunto:</label>
            <input id="subject" type="text" name="subject" placeholder="Digite o assunto da mensagem">
            <span id="errSubject"></span>

            <label for="message">Mensagem:</label>
            <textarea id="message" name="mensagem" placeholder="Digite sua mensagem"></textarea>

            <button type="submit">Enviar</button>

        </form>

        <!-- Seção do Google Maps -->
        <article class="article_mapa">

            <address>
                <p>Av. Caçapava, 352</p>
                <p>Petrópolis - Porto Alegre - RS</p>
            </address>

            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3453.801668809444!2d-51.182552799999996!3d-30.042547299999995!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x95197821af1ded55%3A0xa4810caba6252124!2sAv.%20Ca%C3%A7apava%2C%20352%20-%20Petr%C3%B3polis%2C%20Porto%20Alegre%20-%20RS%2C%2090460-130!5e0!3m2!1spt-BR!2sbr!4v1767737700695!5m2!1spt-BR!2sbr" width="400" height="300" style="border: 0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </iframe>

        </article>

    </main>

    <!-- Rodapé -->
    <footer>

        <section>
            <a href="https://www.linkedin.com/">
                <img src="assets/img/linkedin-icon-2-logo-svgrepo-com.svg" alt="LinkedIn" width="60" height="60">
            </a>

            <a href="https://github.com/edduarte-dev">
                <img src="assets/img/github-color-svgrepo-com.svg" alt="GitHub" width="60" height="60">
            </a>
        </section>

        <h3>
            Desenvolvido com 🧡 por Eduardo Duarte Cunha - 2026.
        </h3>

    </footer>

</body>

</html>
